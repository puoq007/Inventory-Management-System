<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jig Inventory</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=1772814275" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="frontend.styles.css" rel="stylesheet" />
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        console.log("Jig Inventory JS Initializing...");

        window.confirmAction = function (title, text, confirmBtnStr, icon) {
            return Swal.fire({
                title: title || 'Are you sure?',
                text: text || "You won't be able to revert this!",
                icon: icon || 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: confirmBtnStr || 'Yes'
            }).then((result) => {
                return result.isConfirmed;
            });
        };

        window.downloadTextFile = function (fileName, content) {
            const blob = new Blob(["\ufeff" + content], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        const cleanDate = (d) => {
            if (!d || d === '-') return '-';
            const match = d.match(/(\d{1,4}[\/\-]\d{1,2}[\/\-]\d{1,4})/);
            return match ? match[1] : d.split(' ')[0].split('T')[0];
        };
        const cssTemplate = `
            @page { margin: 0; }
            * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
            html, body { 
                margin: 0; 
                padding: 0; 
                background: white; 
                font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            }
            .print-page {
                page-break-after: always;
                padding: 5mm; /* Top/Left padding to prevent sticking to edges */
                display: block;
            }
            .plate { 
                width: 25mm; 
                height: 25mm; 
                position: relative; 
                background: white;
                border: 1.5px solid #000; /* Dark, solid guide for cutting */
                page-break-inside: avoid;
            }
            /* QR code: centered, slightly offset left to give date room */
            .plate-qr {
                position: absolute;
                top: 4.5mm;
                left: 2.5mm;
                width: 16mm;
                height: 16mm;
            }
            .plate-qr svg { width: 100%; height: 100%; }
            /* Tool: top-left, offset to avoid hole */
            .plate-tool {
                position: absolute;
                top: 0.5mm;
                left: 4.5mm;
                font-size: 9.5pt; /* Increased size requested by user */
                font-weight: 800;
                color: #000;
                line-height: 1;
                white-space: nowrap;
            }
            /* Step number: bottom-center */
            .plate-step {
                position: absolute;
                bottom: 0.5mm;
                left: 50%;
                transform: translateX(-50%);
                font-size: 9pt;
                font-weight: 900;
                color: #000;
                line-height: 1;
                white-space: nowrap;
            }
            /* Date: right side, rotated 90° */
            .plate-date {
                position: absolute;
                right: 0mm; /* Pushed as far right as possible */
                top: 50%;
                transform: translateY(-50%) rotate(90deg);
                transform-origin: center center;
                font-size: 6.5pt;
                font-weight: 800;
                color: #000;
                white-space: nowrap;
            }
        `;

        window.printQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=400,height=400');
            const dateStr = cleanDate(data.date);
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Plate QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="print-page">
                        <div class="plate">
                            <div class="plate-qr">${svgHtml}</div>
                            <div class="plate-tool">${data.toolNo || '-'}</div>
                            <div class="plate-step">${data.stepPrint || '-'}</div>
                            <div class="plate-date">${dateStr}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=800,height=600');
            let contentList = '';
            
            qrDataList.forEach(data => {
                const dateStr = cleanDate(data.date);
                contentList += `
                    <div class="print-page">
                        <div class="plate">
                            <div class="plate-qr">${data.svg}</div>
                            <div class="plate-tool">${data.toolNo || '-'}</div>
                            <div class="plate-step">${data.stepPrint || '-'}</div>
                            <div class="plate-date">${dateStr}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print Multiple Plates</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printLocatorQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=500,height=500');
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Site: </span><strong>${data.site || '-'}</strong></div>
                            <div class="row"><span class="label">Cabinet: </span>${data.cabinet || '-'}</div>
                            <div class="row"><span class="label">Shelf: </span>${data.shelf || '-'}</div>
                            <div class="row"><span class="label">Type: </span>${data.type || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printLocatorQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Site: </span><strong>${data.site || '-'}</strong></div>
                            <div class="row"><span class="label">Cabinet: </span>${data.cabinet || '-'}</div>
                            <div class="row"><span class="label">Shelf: </span>${data.shelf || '-'}</div>
                            <div class="row"><span class="label">Type: </span>${data.type || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print Location QR</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printUserQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=500,height=500');
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Name: </span><strong>${data.name || '-'}</strong></div>
                            <div class="row"><span class="label">Role: </span>${data.role || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printUserQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Name: </span><strong>${data.name || '-'}</strong></div>
                            <div class="row"><span class="label">Role: </span>${data.role || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print User QR Badges</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        let scanner = null;
        window.startQrScan = function (dotNetHelper, elementId) {
            try {
                if (scanner) { scanner.clear(); }
                scanner = new Html5QrcodeScanner(elementId, {
                    fps: 10, qrbox: { width: 250, height: 250 },
                    rememberLastUsedCamera: true, aspectRatio: 1.0
                });
                scanner.render((decodedText) => { dotNetHelper.invokeMethodAsync('OnQrScanned', decodedText); });
            } catch (err) { console.error("QR Scanner Error:", err); }
        };

        window.stopQrScan = function () {
            if (scanner) {
                try {
                    scanner.clear(); scanner = null;
                    const reader = document.getElementById('qr-reader');
                    if (reader) reader.innerHTML = '';
                } catch (err) { console.warn("Stop QR Error (ignorable):", err); }
            }
        };

        console.log("Jig Inventory JS Loaded.");
    </script>
</body>

</html>
