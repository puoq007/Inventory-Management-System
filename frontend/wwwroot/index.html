        /* Visible boot shell until Blazor replaces #app (no dependency on bundled .loading-progress CSS) */
        #app {

            align-items: center;
            justify-content: center;
            box-sizing: border-box;

    <script>
        console.log("Jig Inventory JS Initializing...");

        window.confirmAction = function (title, text, confirmBtnStr, icon) {
            return Swal.fire({
                title: title || 'Are you sure?',
                text: text || "You won't be able to revert this!",
                icon: icon || 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: confirmBtnStr || 'Yes'
            }).then((result) => {
                return result.isConfirmed;
            });
        };

        window.downloadTextFile = function (fileName, content) {
            const blob = new Blob(["\ufeff" + content], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        window.exportPdf = async function (title, htmlContent, fileName) {
            // Convert logo to base64 for embedding in PDF
            let logoHtml = '<div class="logo-text">MATTEL</div>';
            try {
                const resp = await fetch('/images/mattel.png');
                const blob = await resp.blob();
                const b64 = await new Promise(res => {
                    const r = new FileReader();
                    r.onloadend = () => res(r.result);
                    r.readAsDataURL(blob);
                });
                logoHtml = `<img src="${b64}" class="logo-img" alt="Mattel" />`;
            } catch(e) {}

            const printWnd = window.open('', '_blank', 'width=900,height=700');
            printWnd.document.write(`<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>${title}</title>
  <style>
    @page { size: A4; margin: 15mm 15mm 15mm 15mm; }
    * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 10pt; color: #111; background: white; margin: 0; padding: 0; }
    .pdf-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #cc0000; padding-bottom: 6px; margin-bottom: 14px; }
    .pdf-header .logo-text { font-size: 18pt; font-weight: 900; color: #cc0000; letter-spacing: 1px; }
    .pdf-header .logo-img { height: 72px; width: auto; object-fit: contain; }
    .pdf-header .meta { text-align: right; font-size: 8pt; color: #555; }
    h2 { font-size: 13pt; font-weight: 800; color: #111; margin: 14px 0 6px 0; border-left: 4px solid #cc0000; padding-left: 8px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 8.5pt; }
    thead tr { background: #1e293b; color: white; }
    thead th { padding: 6px 8px; text-align: left; font-weight: 700; font-size: 8pt; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: #f1f5f9; }
    tbody td { padding: 5px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat-card { border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 12px; }
    .stat-card .label { font-size: 7.5pt; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 18pt; font-weight: 900; color: #111; line-height: 1.2; margin-top: 2px; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 7.5pt; font-weight: 700; }
    .badge-green  { background: #dcfce7; color: #166534; }
    .badge-blue   { background: #dbeafe; color: #1e40af; }
    .badge-amber  { background: #fef3c7; color: #92400e; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-purple { background: #f3e8ff; color: #6b21a8; }
    .badge-gray   { background: #f1f5f9; color: #475569; }
    .pdf-footer { margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 6px; font-size: 7.5pt; color: #94a3b8; text-align: center; }
  </style>
</head>
<body>
  ${htmlContent.replace('<div class=\'logo-text\'>MATTEL</div>', logoHtml)}
  <script>window.onload = function(){ setTimeout(function(){ window.print(); }, 400); }<\/script>
</body>
</html>`);
            printWnd.document.close();
        };

        const cleanDate = (dString) => {
            if (!dString || dString === '-') return '-';
            // Strip time
            let d = dString.split(' ')[0].split('T')[0];
            d = d.replace(/-/g, '/');
            
            let parts = d.split('/');
            if (parts.length === 3) {
                let p1 = parseInt(parts[0], 10);
                let p2 = parseInt(parts[1], 10);
                let p3 = parseInt(parts[2], 10);
                
                let day, month, year;
                // Detect YYYY/MM/DD vs DD/MM/YYYY
                if (p1 > 31) {
                    year = p1; month = p2; day = p3;
                } else {
                    day = p1; month = p2; year = p3;
                }
                
                if (year >= 2500) year -= 543;
                if (year < 100) year += 2000;
                
                let dd = day.toString().padStart(2, '0');
                let mm = month.toString().padStart(2, '0');
                return `${dd}/${mm}/${year}`;
            }
            return d;
        };
        const cssTemplate = `
            @page { 
                size: 100mm 40mm;
                margin: 0; 
            }
            * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            html, body { 
                margin: 0; 
                padding: 0; 
                background: white; 
                font-family: Arial, Helvetica, sans-serif;
            }
            .print-page {
                page-break-after: always;
                width: 100mm;
                height: 40mm;
                position: relative;
                overflow: hidden;
            }
            /* รูเจาะ Ø3.5mm — มุมซ้ายบน และ มุมขวาล่าง */
            .hole-left, .hole-right {
                position: absolute;
                width: 3.5mm;
                height: 3.5mm;
                border-radius: 50%;
                border: 0.4mm solid #bbb;
                background: white;
                z-index: 10;
            }
            .hole-left  { left: 1.25mm;  top: 1.75mm; }
            .hole-right { right: 1.25mm; bottom: 1.75mm; }
            .plate { 
                position: absolute;
                /* usable area: 87mm x 33mm ระหว่างรูสองรู */
                top: 3.5mm;
                left: 6.5mm;
                width: 87mm;
                height: 33mm;
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 2.5mm;
            }
            .plate-qr {
                width: 29mm;
                height: 29mm;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .plate-qr svg { width: 29mm; height: 29mm; display: block; }
            .plate-info {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 0.7mm;
                min-width: 0;
                padding-left: 2mm;
            }
            .plate-id {
                font-size: 11pt;

            .plate-row {

                color: #000;
                line-height: 1.3;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .plate-inline {
                display: flex;
                gap: 3mm;
            }
        `;

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>
                    @page { size: A4; margin: 10mm; }
                    * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
                    body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: white; }
                    .card { display: inline-flex; align-items: center; gap: 10px; border: 1px solid #ccc; border-radius: 8px; padding: 10px 14px; width: 220px; }
                    .card .qr svg { width: 70px; height: 70px; }
                    .card .info { display: flex; flex-direction: column; gap: 2px; }
                    .card .id { font-size: 13pt; font-weight: 900; color: #000; }
                    .card .row { font-size: 8pt; color: #111; font-weight: 600; }
                    .card .label { color: #333; font-weight: 700; }
                </style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Name: </span><strong>${data.name || '-'}</strong></div>
                            <div class="row"><span class="label">Role: </span>${data.role || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printUserQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Name: </span><strong>${data.name || '-'}</strong></div>
                            <div class="row"><span class="label">Role: </span>${data.role || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print User QR Badges</title>
                <style>
                    @page { size: A4; margin: 10mm; }
                    * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
                    body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: white; }
                    .cards-grid { display: flex; flex-wrap: wrap; gap: 10px; }
                    .card { display: flex; align-items: center; gap: 10px; border: 1px solid #ccc; border-radius: 8px; padding: 10px 14px; width: 220px; break-inside: avoid; }
                    .card .qr svg { width: 70px; height: 70px; }
                    .card .info { display: flex; flex-direction: column; gap: 2px; }
                    .card .id { font-size: 13pt; font-weight: 900; color: #000; }
                    .card .row { font-size: 8pt; color: #111; font-weight: 600; }
                    .card .label { color: #333; font-weight: 700; }
                </style>
                </head>
                <body>
                    <div class="cards-grid">
                        ${contentList}
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        let scanner = null;
        window.startQrScan = function (dotNetHelper, elementId) {
            try {
                if (scanner) { scanner.clear(); }
                scanner = new Html5QrcodeScanner(elementId, {
                    fps: 10, qrbox: { width: 250, height: 250 },
                    rememberLastUsedCamera: true, aspectRatio: 1.0
                });
                scanner.render((decodedText) => { dotNetHelper.invokeMethodAsync('OnQrScanned', decodedText); });
            } catch (err) { console.error("QR Scanner Error:", err); }
        };

        window.stopQrScan = function () {
            if (scanner) {
                try {
                    scanner.clear(); scanner = null;
                    const reader = document.getElementById('qr-reader');
                    if (reader) reader.innerHTML = '';
                } catch (err) { console.warn("Stop QR Error (ignorable):", err); }
            }
        };

        let activityChartInstance = null;
        window.initActivityChart = function (canvasId, labels, dataOut, dataIn, dataClean, labelOut, labelIn, labelClean) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;

            if (activityChartInstance) {
                if (activityChartInstance.canvas !== ctx) {
                    // Blazor recreated the DOM element (e.g. user navigated away and came back)
                    activityChartInstance.destroy();
                    activityChartInstance = null;
                } else {
                    // Same DOM element, just update the data smoothly
                    activityChartInstance.data.labels = labels;
                    activityChartInstance.data.datasets[0].label = labelOut || 'Check Outs';
                    activityChartInstance.data.datasets[1].label = labelIn || 'Store';
                    activityChartInstance.data.datasets[2].label = labelClean || 'Cleaning';
                    activityChartInstance.data.datasets[0].data = dataOut;
                    activityChartInstance.data.datasets[1].data = dataIn;
                    activityChartInstance.data.datasets[2].data = dataClean;
                    activityChartInstance.update();
                    return;
                }
            }

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

            activityChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: labelOut || 'Check Outs',
                            data: dataOut,
                            backgroundColor: '#818cf8',
                            hoverBackgroundColor: '#a5b4fc',
                            borderRadius: 4,
                            borderSkipped: false
                        },
                        {
                            label: labelIn || 'Store',
                            data: dataIn,
                            backgroundColor: '#34d399',
                            hoverBackgroundColor: '#6ee7b7',
                            borderRadius: 4,
                            borderSkipped: false
                        },
                        {
                            label: labelClean || 'Cleaning',
                            data: dataClean,
                            backgroundColor: '#fbbf24',
                            hoverBackgroundColor: '#fcd34d',
                            borderRadius: 4,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 12,
                                boxHeight: 12,
                                font: {
                                    size: 12,
                                    weight: 'bold'
                                },
                                generateLabels: function(chart) {
                                    const original = Chart.defaults.plugins.legend.labels.generateLabels;
                                    const labelsOriginal = original.call(this, chart);
                                    labelsOriginal.forEach(label => {
                                        // Remove the default strikethrough
                                        label.textDecoration = 'none';
                                        
                                        // Make the text darker when hidden
                                        label.fontColor = label.hidden ? '#475569' : '#cbd5e1';
                                        
                                        // Make it look like an empty radio button when not selected
                                        if (label.hidden) {
                                            label.strokeStyle = label.fillStyle; 
                                            label.fillStyle = 'transparent';
                                            label.lineWidth = 2;
                                        }
                                    });
                                    return labelsOriginal;
                                }
                            },
                            onClick: function(e, legendItem, legend) {
                                const index = legendItem.datasetIndex;
                                const ci = legend.chart;
                                
                                if (!ci.customSelection) {
                                    ci.customSelection = new Set();
                                }
                                
                                if (ci.customSelection.has(index)) {
                                    ci.customSelection.delete(index);
                                } else {
                                    ci.customSelection.add(index);
                                }
                                
                                if (ci.customSelection.size === 0) {
                                    for (let i = 0; i < ci.data.datasets.length; i++) {
                                        ci.getDatasetMeta(i).hidden = false;
                                    }
                                } else {
                                    for (let i = 0; i < ci.data.datasets.length; i++) {
                                        ci.getDatasetMeta(i).hidden = !ci.customSelection.has(i);
                                    }
                                }
                                
                                ci.update();
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#f1f5f9',
                            bodyColor: '#cbd5e1',
                            borderColor: '#334155',
                            borderWidth: 1,
                            padding: 10,
                            cornerRadius: 8,
                            displayColors: true,
                            boxPadding: 4
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                font: {
                                    weight: '600'
                                }
                            }
                        },
                        y: {
                            grid: {
                                color: '#334155',
                                drawBorder: false,
                                borderDash: [5, 5]
                            },
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1,
                                precision: 0
                            }
                        }
                    }
                }
            });
        };

        console.log("Jig Inventory JS Loaded.");
    </script>
</body>

</html>
