<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jig Inventory</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=1772814275" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="frontend.styles.css" rel="stylesheet" />
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="background-color: #0f172a; color: #cbd5e1; margin: 0;">
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        console.log("Jig Inventory JS Initializing...");

        window.confirmAction = function (title, text, confirmBtnStr, icon) {
            return Swal.fire({
                title: title || 'Are you sure?',
                text: text || "You won't be able to revert this!",
                icon: icon || 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: confirmBtnStr || 'Yes'
            }).then((result) => {
                return result.isConfirmed;
            });
        };

        window.downloadTextFile = function (fileName, content) {
            const blob = new Blob(["\ufeff" + content], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        const cleanDate = (dString) => {
            if (!dString || dString === '-') return '-';
            // Strip time
            let d = dString.split(' ')[0].split('T')[0];
            d = d.replace(/-/g, '/');
            
            let parts = d.split('/');
            if (parts.length === 3) {
                let p1 = parseInt(parts[0], 10);
                let p2 = parseInt(parts[1], 10);
                let p3 = parseInt(parts[2], 10);
                
                let day, month, year;
                // Detect YYYY/MM/DD vs DD/MM/YYYY
                if (p1 > 31) {
                    year = p1; month = p2; day = p3;
                } else {
                    day = p1; month = p2; year = p3;
                }
                
                if (year >= 2500) year -= 543;
                if (year < 100) year += 2000;
                
                let dd = day.toString().padStart(2, '0');
                let mm = month.toString().padStart(2, '0');
                return `${dd}/${mm}/${year}`;
            }
            return d;
        };
        const cssTemplate = `
            @page { 
                size: 100mm 40mm;
                margin: 0; 
            }
            * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
            html, body { 
                margin: 0; 
                padding: 0; 
                background: white; 
                font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            }
            .print-page {
                page-break-after: always;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100mm;
                height: 40mm;
            }
            .plate { 
                width: 100mm;
                height: 40mm;
                display: flex;
                align-items: stretch;
                background: white;
                border: 1px solid #aaa;
                border-radius: 4mm;
                overflow: hidden;
                padding: 2mm;
            }
            .plate-qr {
                width: 32mm;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding-right: 2mm;
                border-right: 1.5px dashed #ccc;
            }
            .plate-qr svg { width: 100%; height: auto; max-height: 34mm; }
            .plate-info {
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                margin-left: 2mm;
                padding: 1mm 0;
            }
            .plate-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                border-bottom: 2px solid #000;
                padding-bottom: 1.5mm;
                margin-bottom: 1mm;
            }
            .plate-tool {
                font-size: 15pt;
                font-weight: 900;
                color: #000;
                line-height: 1;
                letter-spacing: -0.5px;
            }
            .plate-date {
                font-size: 8pt;
                font-weight: 700;
                color: #555;
                line-height: 1.2;
                white-space: nowrap;
            }
            .plate-body {
                flex-grow: 1;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 1mm;
            }
            .plate-step-wrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .plate-step-label {
                font-size: 6pt;
                font-weight: 800;
                color: #888;
                letter-spacing: 1px;
                margin-bottom: -1mm;
            }
            .plate-step {
                font-size: 28pt;
                font-weight: 900;
                color: #000;
                line-height: 1;
            }
            .plate-jigtype {
                font-size: 8pt;
                font-weight: 800;
                color: #000;
                background: #e5e7eb;
                border: 1px solid #ccc;
                padding: 1mm 2.5mm;
                border-radius: 4mm;
                text-align: center;
                text-transform: uppercase;
                max-width: 28mm;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .plate-footer {
                display: flex;
                justify-content: space-between;
                background: #f8f9fa;
                border: 1px solid #ddd;
                border-radius: 2mm;
                padding: 1.5mm 2mm;
                margin-top: 1mm;
            }
            .plate-spec {
                font-size: 8pt;
                font-weight: 800;
                color: #000;
            }
            .plate-spec span {
                color: #666;
                font-weight: 600;
                font-size: 7pt;
                margin-right: 0.5mm;
            }
        `;

        window.printQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=420,height=200');
            const dateStr = cleanDate(data.date);
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Plate QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="print-page">
                        <div class="plate">
                            <div class="plate-qr">${svgHtml}</div>
                            <div class="plate-info">
                                <div class="plate-header">
                                    <span class="plate-tool">${data.toolNo || '-'}</span>
                                    <span class="plate-date">${dateStr}</span>
                                </div>
                                <div class="plate-body">
                                    <div class="plate-step-wrapper">
                                        <span class="plate-step-label">STEP</span>
                                        <span class="plate-step">${data.stepPrint || '-'}</span>
                                    </div>
                                    <div class="plate-jigtype">${data.jigType || '-'}</div>
                                </div>
                                <div class="plate-footer">
                                    <div class="plate-spec"><span>H:</span>${data.heightJig || '-'}</div>
                                    <div class="plate-spec"><span>F:</span>${data.feed || '-'}</div>
                                    <div class="plate-spec"><span>S:</span>${data.scan || '-'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=420,height=400');
            let contentList = '';
            
            qrDataList.forEach(data => {
                const dateStr = cleanDate(data.date);
                contentList += `
                    <div class="print-page">
                        <div class="plate">
                            <div class="plate-qr">${data.svg}</div>
                            <div class="plate-info">
                                <div class="plate-header">
                                    <span class="plate-tool">${data.toolNo || '-'}</span>
                                    <span class="plate-date">${dateStr}</span>
                                </div>
                                <div class="plate-body">
                                    <div class="plate-step-wrapper">
                                        <span class="plate-step-label">STEP</span>
                                        <span class="plate-step">${data.stepPrint || '-'}</span>
                                    </div>
                                    <div class="plate-jigtype">${data.jigType || '-'}</div>
                                </div>
                                <div class="plate-footer">
                                    <div class="plate-spec"><span>H:</span>${data.heightJig || '-'}</div>
                                    <div class="plate-spec"><span>F:</span>${data.feed || '-'}</div>
                                    <div class="plate-spec"><span>S:</span>${data.scan || '-'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print Multiple Plates</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printLocatorQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=500,height=500');
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Site: </span><strong>${data.site || '-'}</strong></div>
                            <div class="row"><span class="label">Cabinet: </span>${data.cabinet || '-'}</div>
                            <div class="row"><span class="label">Shelf: </span>${data.shelf || '-'}</div>
                            <div class="row"><span class="label">Type: </span>${data.type || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printLocatorQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Site: </span><strong>${data.site || '-'}</strong></div>
                            <div class="row"><span class="label">Cabinet: </span>${data.cabinet || '-'}</div>
                            <div class="row"><span class="label">Shelf: </span>${data.shelf || '-'}</div>
                            <div class="row"><span class="label">Type: </span>${data.type || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print Location QR</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printUserQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=500,height=500');
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Name: </span><strong>${data.name || '-'}</strong></div>
                            <div class="row"><span class="label">Role: </span>${data.role || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printUserQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Name: </span><strong>${data.name || '-'}</strong></div>
                            <div class="row"><span class="label">Role: </span>${data.role || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print User QR Badges</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        let scanner = null;
        window.startQrScan = function (dotNetHelper, elementId) {
            try {
                if (scanner) { scanner.clear(); }
                scanner = new Html5QrcodeScanner(elementId, {
                    fps: 10, qrbox: { width: 250, height: 250 },
                    rememberLastUsedCamera: true, aspectRatio: 1.0
                });
                scanner.render((decodedText) => { dotNetHelper.invokeMethodAsync('OnQrScanned', decodedText); });
            } catch (err) { console.error("QR Scanner Error:", err); }
        };

        window.stopQrScan = function () {
            if (scanner) {
                try {
                    scanner.clear(); scanner = null;
                    const reader = document.getElementById('qr-reader');
                    if (reader) reader.innerHTML = '';
                } catch (err) { console.warn("Stop QR Error (ignorable):", err); }
            }
        };

        console.log("Jig Inventory JS Loaded.");
    </script>
</body>

</html>
