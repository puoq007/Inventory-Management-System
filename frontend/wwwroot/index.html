<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=1772814275" />
    <link rel="stylesheet" href="css/layout-responsive.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Visible boot shell until Blazor replaces #app (no dependency on bundled .loading-progress CSS) */
        #app {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .blazor-boot-msg {
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
            font-size: 0.95rem;
            color: #94a3b8;
            text-align: center;
            padding: 1rem;
        }
        #blazor-error-ui {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            background: #7f1d1d;
            color: #fecaca;
            padding: 0.75rem 1rem;
            text-align: center;
            font-family: system-ui, sans-serif;
            font-size: 0.875rem;
        }
        #blazor-error-ui.visible { display: block; }

        /* Hide browser's native password reveal button (Edge/Chrome black eye icon) */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
        input[type="password"]::-webkit-credentials-auto-fill-button {
            display: none;
        }
    </style>
</head>

<body style="background-color: #0f172a; color: #cbd5e1; margin: 0;">
    <div id="app">
        <div class="blazor-boot-msg">Loading Jig Inventory…</div>
    </div>
    <div id="blazor-error-ui">
        An error occurred loading the app. Check the browser console (F12) or refresh the page.
        <a href="#" onclick="location.reload();return false" style="color:#fecaca;margin-left:0.5rem;">Reload</a>
    </div>


    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        console.log("Jig Inventory JS Initializing...");

        window.confirmAction = function (title, text, confirmBtnStr, icon) {
            return Swal.fire({
                title: title || 'Are you sure?',
                text: text || "You won't be able to revert this!",
                icon: icon || 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: confirmBtnStr || 'Yes'
            }).then((result) => {
                return result.isConfirmed;
            });
        };

        window.downloadTextFile = function (fileName, content) {
            const blob = new Blob(["\ufeff" + content], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        const cleanDate = (dString) => {
            if (!dString || dString === '-') return '-';
            // Strip time
            let d = dString.split(' ')[0].split('T')[0];
            d = d.replace(/-/g, '/');
            
            let parts = d.split('/');
            if (parts.length === 3) {
                let p1 = parseInt(parts[0], 10);
                let p2 = parseInt(parts[1], 10);
                let p3 = parseInt(parts[2], 10);
                
                let day, month, year;
                // Detect YYYY/MM/DD vs DD/MM/YYYY
                if (p1 > 31) {
                    year = p1; month = p2; day = p3;
                } else {
                    day = p1; month = p2; year = p3;
                }
                
                if (year >= 2500) year -= 543;
                if (year < 100) year += 2000;
                
                let dd = day.toString().padStart(2, '0');
                let mm = month.toString().padStart(2, '0');
                return `${dd}/${mm}/${year}`;
            }
            return d;
        };
        const cssTemplate = `
            @page { 
                size: 100mm 40mm;
                margin: 0; 
            }
            * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            html, body { 
                margin: 0; 
                padding: 0; 
                background: white; 
                font-family: Arial, Helvetica, sans-serif;
            }
            .print-page {
                page-break-after: always;
                width: 100mm;
                height: 40mm;
                position: relative;
                overflow: hidden;
            }
            /* รูเจาะ Ø3.5mm — มุมซ้ายบน และ มุมขวาล่าง */
            .hole-left, .hole-right {
                position: absolute;
                width: 3.5mm;
                height: 3.5mm;
                border-radius: 50%;
                border: 0.4mm solid #bbb;
                background: white;
                z-index: 10;
            }
            .hole-left  { left: 1.25mm;  top: 1.75mm; }
            .hole-right { right: 1.25mm; bottom: 1.75mm; }
            .plate { 
                position: absolute;
                /* usable area: 87mm x 33mm ระหว่างรูสองรู */
                top: 3.5mm;
                left: 6.5mm;
                width: 87mm;
                height: 33mm;
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 2.5mm;
            }
            .plate-qr {
                width: 29mm;
                height: 29mm;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .plate-qr svg { width: 29mm; height: 29mm; display: block; }
            .plate-info {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 0.7mm;
                min-width: 0;
                padding-left: 2mm;
            }
            .plate-id {
                font-size: 11pt;
                font-weight: 900;
                color: #000;
                line-height: 1.1;
                letter-spacing: -0.3px;
                margin-bottom: 0.5mm;
            }
            .plate-row {
                font-size: 6pt;
                font-weight: 400;
                color: #000;
                line-height: 1.3;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .plate-inline {
                display: flex;
                gap: 3mm;
            }
        `;

        window.printQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=420,height=220');
            const dateStr = cleanDate(data.date);
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="print-page">
                        <div class="hole-left"></div>
                        <div class="hole-right"></div>
                        <div class="plate">
                            <div class="plate-qr">${svgHtml}</div>
                            <div class="plate-info">
                                <div class="plate-id">${data.id}</div>
                                <div class="plate-row">DATE: ${dateStr}</div>
                                <div class="plate-row">STEP PRINT: ${data.stepPrint || '-'}</div>
                                <div class="plate-row">HEIGHT JIG: ${data.heightJig || '-'}</div>
                                <div class="plate-row plate-inline">
                                    <span>FEED: ${data.feed || '-'}</span>
                                    <span>SCAN: ${data.scan || '-'}</span>
                                </div>
                                <div class="plate-row">JIG TYPE: ${data.jigType || '-'}</div>
                            </div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=420,height=400');
            let contentList = '';
            
            qrDataList.forEach(data => {
                const dateStr = cleanDate(data.date);
                contentList += `
                    <div class="print-page">
                        <div class="hole-left"></div>
                        <div class="hole-right"></div>
                        <div class="plate">
                            <div class="plate-qr">${data.svg}</div>
                            <div class="plate-info">
                                <div class="plate-id">${data.id}</div>
                                <div class="plate-row">DATE: ${dateStr}</div>
                                <div class="plate-row">STEP PRINT: ${data.stepPrint || '-'}</div>
                                <div class="plate-row">HEIGHT JIG: ${data.heightJig || '-'}</div>
                                <div class="plate-row plate-inline">
                                    <span>FEED: ${data.feed || '-'}</span>
                                    <span>SCAN: ${data.scan || '-'}</span>
                                </div>
                                <div class="plate-row">JIG TYPE: ${data.jigType || '-'}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print Multiple Plates</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printLocatorQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=500,height=500');
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Site: </span><strong>${data.site || '-'}</strong></div>
                            <div class="row"><span class="label">Cabinet: </span>${data.cabinet || '-'}</div>
                            <div class="row"><span class="label">Shelf: </span>${data.shelf || '-'}</div>
                            <div class="row"><span class="label">Type: </span>${data.type || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printLocatorQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Site: </span><strong>${data.site || '-'}</strong></div>
                            <div class="row"><span class="label">Cabinet: </span>${data.cabinet || '-'}</div>
                            <div class="row"><span class="label">Shelf: </span>${data.shelf || '-'}</div>
                            <div class="row"><span class="label">Type: </span>${data.type || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print Location QR</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printUserQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=500,height=500');
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Name: </span><strong>${data.name || '-'}</strong></div>
                            <div class="row"><span class="label">Role: </span>${data.role || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printUserQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Name: </span><strong>${data.name || '-'}</strong></div>
                            <div class="row"><span class="label">Role: </span>${data.role || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print User QR Badges</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        let scanner = null;
        window.startQrScan = function (dotNetHelper, elementId) {
            try {
                if (scanner) { scanner.clear(); }
                scanner = new Html5QrcodeScanner(elementId, {
                    fps: 10, qrbox: { width: 250, height: 250 },
                    rememberLastUsedCamera: true, aspectRatio: 1.0
                });
                scanner.render((decodedText) => { dotNetHelper.invokeMethodAsync('OnQrScanned', decodedText); });
            } catch (err) { console.error("QR Scanner Error:", err); }
        };

        window.stopQrScan = function () {
            if (scanner) {
                try {
                    scanner.clear(); scanner = null;
                    const reader = document.getElementById('qr-reader');
                    if (reader) reader.innerHTML = '';
                } catch (err) { console.warn("Stop QR Error (ignorable):", err); }
            }
        };

        let activityChartInstance = null;
        window.initActivityChart = function (canvasId, labels, dataOut, dataIn, dataClean, labelOut, labelIn, labelClean) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;

            if (activityChartInstance) {
                if (activityChartInstance.canvas !== ctx) {
                    // Blazor recreated the DOM element (e.g. user navigated away and came back)
                    activityChartInstance.destroy();
                    activityChartInstance = null;
                } else {
                    // Same DOM element, just update the data smoothly
                    activityChartInstance.data.labels = labels;
                    activityChartInstance.data.datasets[0].label = labelOut || 'Check Outs';
                    activityChartInstance.data.datasets[1].label = labelIn || 'Store';
                    activityChartInstance.data.datasets[2].label = labelClean || 'Cleaning';
                    activityChartInstance.data.datasets[0].data = dataOut;
                    activityChartInstance.data.datasets[1].data = dataIn;
                    activityChartInstance.data.datasets[2].data = dataClean;
                    activityChartInstance.update();
                    return;
                }
            }

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

            activityChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: labelOut || 'Check Outs',
                            data: dataOut,
                            backgroundColor: '#818cf8',
                            hoverBackgroundColor: '#a5b4fc',
                            borderRadius: 4,
                            borderSkipped: false
                        },
                        {
                            label: labelIn || 'Store',
                            data: dataIn,
                            backgroundColor: '#34d399',
                            hoverBackgroundColor: '#6ee7b7',
                            borderRadius: 4,
                            borderSkipped: false
                        },
                        {
                            label: labelClean || 'Cleaning',
                            data: dataClean,
                            backgroundColor: '#fbbf24',
                            hoverBackgroundColor: '#fcd34d',
                            borderRadius: 4,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 12,
                                boxHeight: 12,
                                font: {
                                    size: 12,
                                    weight: 'bold'
                                },
                                generateLabels: function(chart) {
                                    const original = Chart.defaults.plugins.legend.labels.generateLabels;
                                    const labelsOriginal = original.call(this, chart);
                                    labelsOriginal.forEach(label => {
                                        // Remove the default strikethrough
                                        label.textDecoration = 'none';
                                        
                                        // Make the text darker when hidden
                                        label.fontColor = label.hidden ? '#475569' : '#cbd5e1';
                                        
                                        // Make it look like an empty radio button when not selected
                                        if (label.hidden) {
                                            label.strokeStyle = label.fillStyle; 
                                            label.fillStyle = 'transparent';
                                            label.lineWidth = 2;
                                        }
                                    });
                                    return labelsOriginal;
                                }
                            },
                            onClick: function(e, legendItem, legend) {
                                const index = legendItem.datasetIndex;
                                const ci = legend.chart;
                                
                                if (!ci.customSelection) {
                                    ci.customSelection = new Set();
                                }
                                
                                if (ci.customSelection.has(index)) {
                                    ci.customSelection.delete(index);
                                } else {
                                    ci.customSelection.add(index);
                                }
                                
                                if (ci.customSelection.size === 0) {
                                    for (let i = 0; i < ci.data.datasets.length; i++) {
                                        ci.getDatasetMeta(i).hidden = false;
                                    }
                                } else {
                                    for (let i = 0; i < ci.data.datasets.length; i++) {
                                        ci.getDatasetMeta(i).hidden = !ci.customSelection.has(i);
                                    }
                                }
                                
                                ci.update();
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#f1f5f9',
                            bodyColor: '#cbd5e1',
                            borderColor: '#334155',
                            borderWidth: 1,
                            padding: 10,
                            cornerRadius: 8,
                            displayColors: true,
                            boxPadding: 4
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                font: {
                                    weight: '600'
                                }
                            }
                        },
                        y: {
                            grid: {
                                color: '#334155',
                                drawBorder: false,
                                borderDash: [5, 5]
                            },
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1,
                                precision: 0
                            }
                        }
                    }
                }
            });
        };

        console.log("Jig Inventory JS Loaded.");
    </script>
</body>

</html>
