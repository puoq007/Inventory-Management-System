<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jig Inventory</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=1772814275" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="frontend.styles.css" rel="stylesheet" />
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        console.log("Jig Inventory JS Initializing...");

        window.confirmAction = function (title, text, confirmBtnStr, icon) {
            return Swal.fire({
                title: title || 'Are you sure?',
                text: text || "You won't be able to revert this!",
                icon: icon || 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: confirmBtnStr || 'Yes'
            }).then((result) => {
                return result.isConfirmed;
            });
        };

        window.downloadTextFile = function (fileName, content) {
            const blob = new Blob(["\ufeff" + content], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        const cleanDate = (d) => {
            if (!d || d === '-') return '-';
            const match = d.match(/(\d{1,4}[\/\-]\d{1,2}[\/\-]\d{1,4})/);
            return match ? match[1] : d.split(' ')[0].split('T')[0];
        };

        const cssTemplate = `
            @page { 
                size: 4.00in 1.58in;
                margin: 0; 
            }
            * {
                box-sizing: border-box;
            }
            html, body { 
                margin: 0; 
                padding: 0; 
                width: 4.00in;
                overflow: hidden;
            }
            body { 
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            }
            .card { 
                display: flex; 
                align-items: center; 
                width: 4.00in; 
                height: 1.58in; 
                padding: 0;
                margin-left: -3mm;
                page-break-after: always;
                box-sizing: border-box;
                gap: 2mm;
            }
            .qr { flex-shrink: 0; width: 28mm; height: 28mm; display: flex; align-items: center; justify-content: center; }
            .qr svg { width: 100%; height: 100%; }
            .info { 
                text-align: left; 
                flex: 1; 
                min-width: 0; 
                display: flex; 
                flex-direction: column; 
                justify-content: center; 
                height: 100%; 
            }
            .id { font-size: 11pt; font-weight: 800; margin: 0 0 1mm 0; line-height: 1.1; display: block; color: #000; }
            .row { font-size: 7.5pt; color: #000; margin: 0.2mm 0; line-height: 1.2; word-wrap: break-word; font-weight: 600; }
            .label { color: #333; font-weight: 700; font-size: 7pt; text-transform: uppercase; }
        `;

        window.printQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=600,height=500');
            const dateStr = cleanDate(data.date);
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">DATE: </span>${dateStr}</div>
                            <div class="row"><span class="label">STEP PRINT: </span><strong>${data.stepPrint || '-'}</strong></div>
                            <div class="row"><span class="label">HEIGHT JIG: </span>${data.heightJig || '-'}</div>
                            <div class="row"><span class="label">FEED: </span><strong>${data.feed || '-'}</strong> &nbsp; <span class="label">SCAN: </span><strong>${data.scan || '-'}</strong></div>
                            <div class="row"><span class="label">JIG TYPE: </span>${data.jigType || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                const dateStr = cleanDate(data.date);
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">DATE: </span>${dateStr}</div>
                            <div class="row"><span class="label">STEP PRINT: </span><strong>${data.stepPrint || '-'}</strong></div>
                            <div class="row"><span class="label">HEIGHT JIG: </span>${data.heightJig || '-'}</div>
                            <div class="row"><span class="label">FEED: </span><strong>${data.feed || '-'}</strong> &nbsp; <span class="label">SCAN: </span><strong>${data.scan || '-'}</strong></div>
                            <div class="row"><span class="label">JIG TYPE: </span>${data.jigType || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print Physical Jigs QR</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printLocatorQR = function (svgHtml, data) {
            const printWnd = window.open('', '_blank', 'width=500,height=500');
            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print QR - ${data.id}</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    <div class="card">
                        <div class="qr">${svgHtml}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Site: </span><strong>${data.site || '-'}</strong></div>
                            <div class="row"><span class="label">Cabinet: </span>${data.cabinet || '-'}</div>
                            <div class="row"><span class="label">Shelf: </span>${data.shelf || '-'}</div>
                            <div class="row"><span class="label">Type: </span>${data.type || '-'}</div>
                        </div>
                    </div>
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 300); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        window.printLocatorQRs = function (qrDataList) {
            const printWnd = window.open('', '_blank', 'width=900,height=800');
            let contentList = '';
            qrDataList.forEach(data => {
                contentList += `
                    <div class="card">
                        <div class="qr">${data.svg}</div>
                        <div class="info">
                            <span class="id">${data.id}</span>
                            <div class="row"><span class="label">Site: </span><strong>${data.site || '-'}</strong></div>
                            <div class="row"><span class="label">Cabinet: </span>${data.cabinet || '-'}</div>
                            <div class="row"><span class="label">Shelf: </span>${data.shelf || '-'}</div>
                            <div class="row"><span class="label">Type: </span>${data.type || '-'}</div>
                        </div>
                    </div>
                `;
            });

            printWnd.document.write(`<!DOCTYPE html>
                <html>
                <head><title>Print Location QR</title>
                <style>${cssTemplate}</style>
                </head>
                <body>
                    ${contentList}
                    <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 600); }<\/script>
                </body>
                </html>
            `);
            printWnd.document.close();
        };

        let scanner = null;
        window.startQrScan = function (dotNetHelper, elementId) {
            try {
                if (scanner) { scanner.clear(); }
                scanner = new Html5QrcodeScanner(elementId, {
                    fps: 10, qrbox: { width: 250, height: 250 },
                    rememberLastUsedCamera: true, aspectRatio: 1.0
                });
                scanner.render((decodedText) => { dotNetHelper.invokeMethodAsync('OnQrScanned', decodedText); });
            } catch (err) { console.error("QR Scanner Error:", err); }
        };

        window.stopQrScan = function () {
            if (scanner) {
                try {
                    scanner.clear(); scanner = null;
                    const reader = document.getElementById('qr-reader');
                    if (reader) reader.innerHTML = '';
                } catch (err) { console.warn("Stop QR Error (ignorable):", err); }
            }
        };

        console.log("Jig Inventory JS Loaded.");
    </script>
</body>

</html>
